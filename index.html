<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Grade Calculator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1a1c1e;
            --text-muted: #64748b;
            --accent-primary: #0063ff;
            --accent-hover: #0051d4;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --shadow: rgba(0, 0, 0, 0.05) 0px 20px 25px -5px, rgba(0, 0, 0, 0.04) 0px 10px 10px -5px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-hover: #60a5fa;
            --border-color: #334155;
            --input-bg: #1e293b;
            --shadow: rgba(0, 0, 0, 0.3) 0px 20px 25px -5px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: var(--transition);
            overflow: hidden;
            background-image: radial-gradient(circle at 20% 20%, rgba(0, 99, 255, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(0, 99, 255, 0.05) 0%, transparent 40%);
        }

        .container {
            width: 90%;
            max-width: 450px;
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
            border-color: var(--accent-primary);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 0.8rem 1rem;
            border-radius: 16px;
            border: 2px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
            transition: var(--transition);
        }

        .input-wrapper input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(0, 99, 255, 0.1);
        }

        /* Remove arrows from number inputs */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .result-container {
            margin-top: 1rem;
            padding: 1.5rem;
            background: rgba(0, 99, 255, 0.05);
            border-radius: 20px;
            text-align: center;
            transition: var(--transition);
        }

        .score-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .score-value {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent-primary);
            transition: var(--transition);
        }

        .status-badge {
            display: inline-block;
            margin-top: 0.75rem;
            padding: 0.4rem 1rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--border-color);
        }

        /* Animation */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .animate-score {
            animation: pop 0.3s ease-out;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Calculator</h1>
            <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                <svg id="sun" style="display:none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg id="moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>

        <div class="input-group">
            <label for="totalPoints">Total Available Points</label>
            <div class="input-wrapper">
                <input id="totalPoints" class="totalPoints" type="number" placeholder="e.g. 100">
            </div>
        </div>

        <div class="input-group">
            <label for="points">Your Points</label>
            <div class="input-wrapper">
                <input id="points" class="points" type="number" placeholder="e.g. 85">
            </div>
        </div>

        <div class="result-container">
            <span class="score-label">Final Score</span>
            <div class="score-value" id="scoreDisplay">0.00</div>
            <div id="statusBadge" class="status-badge" style="display: none;">Wait</div>
        </div>
    </div>

    <script>
        const pointsInput = document.getElementById("points");
        const totalPointsInput = document.getElementById("totalPoints");
        const scoreDisplay = document.getElementById("scoreDisplay");
        const statusBadge = document.getElementById("statusBadge");
        const themeToggle = document.getElementById("themeToggle");
        const sunIcon = document.getElementById("sun");
        const moonIcon = document.getElementById("moon");

        // Theme Management
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            if (theme === 'dark') {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            } else {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // Calculation Logic
        function calculateScore() {
            const p = parseFloat(pointsInput.value);
            const tp = parseFloat(totalPointsInput.value);

            if (!isNaN(p) && !isNaN(tp) && tp !== 0) {
                let result = (p / tp) * 9 + 1;
                
                // Clamp values if necessary or handle overflow
                result = Math.max(0, result);

                scoreDisplay.textContent = result.toFixed(2);
                scoreDisplay.classList.remove('animate-score');
                void scoreDisplay.offsetWidth; // Trigger reflow
                scoreDisplay.classList.add('animate-score');

                statusBadge.style.display = 'inline-block';

                if (result < 5.5) {
                    scoreDisplay.style.color = "#ef4444"; // Red
                    statusBadge.textContent = "Fail";
                    statusBadge.style.color = "#ef4444";
                    statusBadge.style.background = "rgba(239, 68, 68, 0.1)";
                } else if (result >= 5.5 && result <= 10) {
                    scoreDisplay.style.color = "var(--accent-primary)";
                    statusBadge.textContent = "Pass";
                    statusBadge.style.color = "var(--accent-primary)";
                    statusBadge.style.background = "rgba(0, 99, 255, 0.1)";
                } else {
                    scoreDisplay.style.color = "#10b981"; // Green (Excellent)
                    statusBadge.textContent = "Excellent";
                    statusBadge.style.color = "#10b981";
                    statusBadge.style.background = "rgba(16, 185, 129, 0.1)";
                }
            } else {
                scoreDisplay.textContent = "0.00";
                scoreDisplay.style.color = "var(--text-muted)";
                statusBadge.style.display = 'none';
            }
        }

        // Real-time updates
        [pointsInput, totalPointsInput].forEach(input => {
            input.addEventListener("input", calculateScore);
        });
    </script>
</body>

</html>
